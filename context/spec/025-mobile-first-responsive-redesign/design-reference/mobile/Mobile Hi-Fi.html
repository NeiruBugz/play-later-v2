<!doctype html>
<html lang="en" data-accent="sage">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SavePoint — Mobile Hi-Fi</title>
<link rel="stylesheet" href="savepoint-tokens.css" />
<link rel="stylesheet" href="savepoint-kit.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="sp-kit.jsx"></script>
<script type="text/babel" src="sp-screens-a.jsx"></script>
<script type="text/babel" src="sp-screens-b.jsx"></script>
<script type="text/babel" src="sp-screens-c.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "navCenter": true,
  "navLabels": true,
  "density": "cozy",
  "dark": false,
  "hifi": true
}/*EDITMODE-END*/;

const W = 402, H = 874;
function Phone({ t, children }) {
  return <IOSDevice width={W} height={H} dark={t.dark}>{children}</IOSDevice>;
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tt = { ...t, hifi: true };
  useEffect(() => { document.documentElement.classList.toggle("dark", !!t.dark); }, [t.dark]);

  return (
    <React.Fragment>
      <DesignCanvas>

        <DCSection id="home" title="Home" subtitle="Recommended — “Jump back in”. Home tab returns here; center Log is always one thumb-tap away.">
          <DCArtboard id="hf-dash" label="Dashboard" width={W} height={H}>
            <Phone t={tt}><DashboardScreen t={tt} variant="feed" /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="browse" title="Browse" subtitle="The library reads as a shelf (2-up covers); game detail keeps the primary action pinned and the long page navigable.">
          <DCArtboard id="hf-lib" label="Library — 2-up shelf" width={W} height={H}>
            <Phone t={tt}><LibraryScreen t={tt} variant="grid" /></Phone>
          </DCArtboard>
          <DCArtboard id="hf-detail" label="Game detail — spine + sticky action bar" width={W} height={H}>
            <Phone t={tt}><GameDetailScreen t={tt} variant="stacked" /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="act" title="Act" subtitle="The two core verbs in calm bottom sheets, plus the reflection timeline.">
          <DCArtboard id="hf-log" label="Log a session" width={W} height={H}>
            <Phone t={tt}><LogSessionScreen t={tt} /></Phone>
          </DCArtboard>
          <DCArtboard id="hf-add" label="Add a game" width={W} height={H}>
            <Phone t={tt}><AddGameScreen t={tt} /></Phone>
          </DCArtboard>
          <DCArtboard id="hf-journal" label="Journal — timeline" width={W} height={H}>
            <Phone t={tt}><JournalScreen t={tt} compose={false} /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="you" title="You" subtitle="Compact identity header; settings as a native grouped list.">
          <DCArtboard id="hf-profile" label="Profile" width={W} height={H}>
            <Phone t={tt}><ProfileScreen t={tt} /></Phone>
          </DCArtboard>
          <DCArtboard id="hf-settings" label="Settings" width={W} height={H}>
            <Phone t={tt}><SettingsScreen t={tt} /></Phone>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Open decisions" />
        <TweakRadio label="Density" value={t.density} options={["cozy", "compact"]} onChange={(v) => setTweak("density", v)} />
        <TweakToggle label="Center Log action" value={t.navCenter} onChange={(v) => setTweak("navCenter", v)} />
        <TweakToggle label="Tab labels" value={t.navLabels} onChange={(v) => setTweak("navLabels", v)} />
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak("dark", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
