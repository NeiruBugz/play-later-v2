<!doctype html>
<html lang="en" data-accent="sage">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SavePoint — Desktop Hi-Fi</title>
<link rel="stylesheet" href="savepoint-tokens.css" />
<link rel="stylesheet" href="savepoint-kit.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: var(--background); overflow: hidden; }
  #root { height: 100vh; }
  .app-shell { height: 100vh; overflow: hidden; }
  .app-main { flex: 1; min-width: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  [data-page]::-webkit-scrollbar { width: 11px; }
  [data-page]::-webkit-scrollbar-thumb { background: color-mix(in oklch, var(--border) 80%, transparent); border-radius: 9999px; border: 3px solid var(--background); }
  [data-page]::-webkit-scrollbar-thumb:hover { background: var(--muted-foreground); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="sp-kit.jsx"></script>
<script type="text/babel" src="d-shell.jsx"></script>
<script type="text/babel" src="d-screens-a.jsx"></script>
<script type="text/babel" src="d-screens-b.jsx"></script>
<script type="text/babel" src="d-screens-c.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "collapsed": false,
  "density": "cozy",
  "dark": false,
  "accent": "sage"
}/*EDITMODE-END*/;

const ACCENTS = [["sage", "var(--primary)"], ["indigo", "oklch(0.5 0.15 274)"], ["clay", "oklch(0.55 0.13 42)"], ["plum", "oklch(0.5 0.13 330)"]];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState("home");
  const [gameId, setGameId] = React.useState("hk");
  const [libStatus, setLibStatus] = React.useState("ALL");
  const [modal, setModal] = React.useState(null);

  React.useEffect(() => { document.documentElement.classList.toggle("dark", !!t.dark); }, [t.dark]);
  React.useEffect(() => { document.documentElement.setAttribute("data-accent", t.accent || "sage"); }, [t.accent]);

  const nav = React.useMemo(() => ({
    go(r, opts) { if (r === "library" && opts && opts.status) setLibStatus(opts.status); else if (r === "library") setLibStatus("ALL"); setRoute(r); },
    openGame(id) { setGameId(id); setRoute("detail"); },
    openModal(kind) { setModal(kind); },
    close() { setModal(null); },
  }), []);

  let screen;
  if (route === "home") screen = <DashboardScreen t={t} nav={nav} />;
  else if (route === "library") screen = <LibraryScreen t={t} nav={nav} initialStatus={libStatus} />;
  else if (route === "detail") screen = <GameDetailScreen t={t} nav={nav} gameId={gameId} />;
  else if (route === "journal") screen = <JournalScreen t={t} nav={nav} />;
  else if (route === "profile") screen = <ProfileScreen t={t} nav={nav} />;
  else if (route === "settings") screen = <SettingsScreen t={t} nav={nav} setTweak={setTweak} />;

  return (
    <React.Fragment>
      <div className="app-shell">
        <Sidebar route={route} collapsed={!!t.collapsed} onCollapse={(v) => setTweak("collapsed", v)} nav={nav} />
        <main className="app-main">{screen}</main>
      </div>

      {modal === "log" && <LogSessionModal nav={nav} gameId={route === "detail" ? gameId : "hk"} onClose={nav.close} />}
      {modal === "add" && <AddGameModal nav={nav} onClose={nav.close} />}

      <TweaksPanel>
        <TweakSection label="Navigation" />
        <TweakToggle label="Collapse sidebar" value={t.collapsed} onChange={(v) => setTweak("collapsed", v)} />
        <TweakSection label="Content" />
        <TweakRadio label="Density" value={t.density} options={["cozy", "compact"]} onChange={(v) => setTweak("density", v)} />
        <TweakSection label="Surface" />
        <TweakToggle label="Dark mode" value={t.dark} onChange={(v) => setTweak("dark", v)} />
        <TweakRow label="Accent">
          <div style={{ display: "flex", gap: 8 }}>
            {ACCENTS.map(([key, cc]) => (
              <button key={key} type="button" title={key} onClick={() => setTweak("accent", key)}
                style={{ width: 26, height: 26, borderRadius: 9999, background: cc, cursor: "pointer", padding: 0,
                  border: (t.accent || "sage") === key ? "2px solid #29261b" : "2px solid rgba(0,0,0,.15)" }} />
            ))}
          </div>
        </TweakRow>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
