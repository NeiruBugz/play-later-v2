<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.sw{border-radius:8px;border:1px solid var(--border)}
.mono{font-family:var(--font-runtime-mono)}
.mut{color:var(--muted-foreground)}
.lbl{font-size:11px;letter-spacing:.04em}

</style></head><body>
<div class="lbl mono mut" style="margin-bottom:12px">STATUS · the game-journey taxonomy (Paper)</div>
<div class="row" style="gap:10px">
  <div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:96px;height:30px;border-radius:9999px;background:var(--status-wishlist);color:var(--status-wishlist-foreground);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Wishlist</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:96px;height:30px;border-radius:9999px;background:var(--status-shelf);color:var(--status-shelf-foreground);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Shelf</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:96px;height:30px;border-radius:9999px;background:var(--status-upNext);color:var(--status-upNext-foreground);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Up Next</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:96px;height:30px;border-radius:9999px;background:var(--status-playing);color:var(--status-playing-foreground);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Playing</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:96px;height:30px;border-radius:9999px;background:var(--status-played);color:var(--status-played-foreground);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Played</div></div>
</div>
<div class="lbl mut" style="margin-top:14px">Each owns a --status-* / --status-*-foreground token pair that shifts per theme.</div>
</body></html>
