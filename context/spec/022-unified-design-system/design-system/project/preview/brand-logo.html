<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}html,body{margin:0}body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px}.lbl{font-size:11px;letter-spacing:.04em;color:var(--muted-foreground)}.mono{font-family:var(--font-runtime-mono)}.row{display:flex;gap:22px;align-items:center;flex-wrap:wrap}.glow{color:var(--primary);display:inline-flex}.wm{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-0.015em}.chip{width:34px;height:34px;border-radius:var(--radius-cover);background:var(--primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center}.chip.sm{width:22px;height:22px;border-radius:var(--radius-chip)}</style></head><body>
<div class="lbl mono" style="margin-bottom:14px">LOGO — "Save Glow" (the deliberate save-point marker)</div>
<div class="row">
  <span class="glow"><svg width="52" height="52" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"><rect x="13.2" y="13.2" width="21.6" height="21.6" rx="4" transform="rotate(45 24 24)"/><rect x="19.5" y="19.5" width="9" height="9" rx="1.5" transform="rotate(45 24 24)" fill="currentColor" stroke="none"/></svg></span>
  <span class="row" style="gap:10px"><span class="glow"><svg width="32" height="32" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linejoin="round"><rect x="13.2" y="13.2" width="21.6" height="21.6" rx="4" transform="rotate(45 24 24)"/><rect x="19.5" y="19.5" width="9" height="9" rx="1.5" transform="rotate(45 24 24)" fill="currentColor" stroke="none"/></svg></span><span class="wm">SavePoint</span></span>
  <span class="chip"><svg width="22" height="22" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"><rect x="13.2" y="13.2" width="21.6" height="21.6" rx="4" transform="rotate(45 24 24)"/><rect x="19.5" y="19.5" width="9" height="9" rx="1.5" transform="rotate(45 24 24)" fill="currentColor" stroke="none"/></svg></span>
  <span class="chip sm"><svg width="14" height="14" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linejoin="round"><rect x="13.2" y="13.2" width="21.6" height="21.6" rx="4" transform="rotate(45 24 24)"/><rect x="19.5" y="19.5" width="9" height="9" rx="1.5" transform="rotate(45 24 24)" fill="currentColor" stroke="none"/></svg></span>
</div>
<div class="lbl" style="margin-top:16px">Drawn with currentColor — tints to the active accent. The diamond-in-diamond evokes the "you are here" save marker of classic games.</div>
</body></html>
