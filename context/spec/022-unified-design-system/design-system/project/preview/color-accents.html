<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}html,body{margin:0}body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.col{display:flex;flex-direction:column;gap:10px}.sw{border-radius:8px;border:1px solid var(--border)}.mono{font-family:var(--font-runtime-mono)}.mut{color:var(--muted-foreground)}.lbl{font-size:11px;letter-spacing:.04em}</style></head><body>
<div class="lbl mono mut" style="margin-bottom:12px">ACCENT — one swappable brand hue, set on &lt;html data-accent&gt;</div>
<div class="row" style="gap:14px">
  <div class="col" style="align-items:center;gap:6px"><div data-accent="indigo" style="width:120px;height:46px;border-radius:var(--radius-btn);background:var(--acc-l);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px">Indigo</div><div class="lbl mut">data-accent="indigo"</div></div><div class="col" style="align-items:center;gap:6px"><div data-accent="sage" style="width:120px;height:46px;border-radius:var(--radius-btn);background:var(--acc-l);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px">Sage</div><div class="lbl mut">data-accent="sage"</div></div><div class="col" style="align-items:center;gap:6px"><div data-accent="clay" style="width:120px;height:46px;border-radius:var(--radius-btn);background:var(--acc-l);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px">Clay</div><div class="lbl mut">data-accent="clay"</div></div><div class="col" style="align-items:center;gap:6px"><div data-accent="plum" style="width:120px;height:46px;border-radius:var(--radius-btn);background:var(--acc-l);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:13px">Plum</div><div class="lbl mut">data-accent="plum"</div></div>
</div>
<div class="lbl mut" style="margin-top:14px">Drives the CTA, active states, and the "Playing" status. Light/dark each use a tuned tone. Default = Sage.</div></body></html>
