<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}html,body{margin:0}body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.col{display:flex;flex-direction:column;gap:10px}.sw{border-radius:8px;border:1px solid var(--border)}.mono{font-family:var(--font-runtime-mono)}.mut{color:var(--muted-foreground)}.lbl{font-size:11px;letter-spacing:.04em}</style></head><body>
<div class="lbl mono mut" style="margin-bottom:16px">ELEVATION — four layered tiers (clear depth)</div>
<div class="row" style="gap:20px">
  <div class="col" style="align-items:center;gap:8px"><div style="width:92px;height:58px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-1)"></div><div class="lbl mut mono">shadow-1</div></div><div class="col" style="align-items:center;gap:8px"><div style="width:92px;height:58px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-2)"></div><div class="lbl mut mono">shadow-2</div></div><div class="col" style="align-items:center;gap:8px"><div style="width:92px;height:58px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-3)"></div><div class="lbl mut mono">shadow-3</div></div><div class="col" style="align-items:center;gap:8px"><div style="width:92px;height:58px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-card);box-shadow:var(--shadow-4)"></div><div class="lbl mut mono">shadow-4</div></div>
</div></body></html>
