<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}html,body{margin:0}body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.col{display:flex;flex-direction:column;gap:10px}.sw{border-radius:8px;border:1px solid var(--border)}.mono{font-family:var(--font-runtime-mono)}.mut{color:var(--muted-foreground)}.lbl{font-size:11px;letter-spacing:.04em}</style></head><body>
<div class="lbl mono mut" style="margin-bottom:12px">RADII — crisp & consistent across both modes</div>
<div class="row" style="gap:24px;align-items:flex-end">
  <div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:56px;background:var(--secondary);border:1px solid var(--border);border-radius:var(--radius-cover)"></div><div class="lbl mut">cover · 2px</div></div><div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:56px;background:var(--secondary);border:1px solid var(--border);border-radius:var(--radius-btn)"></div><div class="lbl mut">button / card · 3px</div></div><div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:56px;background:var(--secondary);border:1px solid var(--border);border-radius:var(--radius-chip)"></div><div class="lbl mut">chip · 4px</div></div><div class="col" style="align-items:center;gap:6px"><div style="width:80px;height:56px;background:var(--secondary);border:1px solid var(--border);border-radius:var(--radius-pill)"></div><div class="lbl mut">dot / bar · pill</div></div>
</div>
<div class="lbl mut" style="margin-top:14px">Pills reserved for circles only (avatars, status dots, progress bars).</div></body></html>
