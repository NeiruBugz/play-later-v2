<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.sw{border-radius:8px;border:1px solid var(--border)}
.mono{font-family:var(--font-runtime-mono)}
.mut{color:var(--muted-foreground)}
.lbl{font-size:11px;letter-spacing:.04em}

</style></head><body>
<div class="lbl mono mut" style="margin-bottom:12px">SEMANTIC FEEDBACK</div>
<div class="row" style="gap:10px">
  <div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--destructive)"></div><div class="lbl mut">destructive</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--success)"></div><div class="lbl mut">success</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--warning)"></div><div class="lbl mut">warning</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--info)"></div><div class="lbl mut">info</div></div>
</div></body></html>
