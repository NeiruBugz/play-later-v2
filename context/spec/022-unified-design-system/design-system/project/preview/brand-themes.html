<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}html,body{margin:0}body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.col{display:flex;flex-direction:column;gap:10px}.sw{border-radius:8px;border:1px solid var(--border)}.mono{font-family:var(--font-runtime-mono)}.mut{color:var(--muted-foreground)}.lbl{font-size:11px;letter-spacing:.04em}</style></head><body>
<div class="lbl mono mut" style="margin-bottom:14px">SYSTEM — two surfaces, one identity</div>
<div class="row" style="gap:12px;align-items:center">
  <div style="width:130px;height:74px;border-radius:6px;background:#f5edde;border:1px solid #d8c7a6;display:flex;align-items:flex-end;padding:10px;position:relative"><span style="width:34px;height:12px;border-radius:3px;background:#468b85"></span><span style="position:absolute;top:8px;left:10px;font-size:11px;color:#5a5045;font-weight:600">Light · cream</span></div>
  <div style="width:130px;height:74px;border-radius:6px;background:#26221c;border:1px solid #3a342c;display:flex;align-items:flex-end;padding:10px;position:relative"><span style="width:34px;height:12px;border-radius:3px;background:#5fb0a8"></span><span style="position:absolute;top:8px;left:10px;font-size:11px;color:#d8d2c6;font-weight:600">Dark · charcoal</span></div>
  <div class="col" style="gap:6px;margin-left:8px">
    <div class="row" style="gap:7px"><span style="width:22px;height:22px;border-radius:9999px;background:#5a52d6"></span><span style="width:22px;height:22px;border-radius:9999px;background:#468b85"></span><span style="width:22px;height:22px;border-radius:9999px;background:#b3623f"></span><span style="width:22px;height:22px;border-radius:9999px;background:#9c4f86"></span></div>
    <div class="lbl mut">4 swappable accents</div>
  </div>
</div>
<div class="lbl mut" style="margin-top:14px">True light/dark inversions: shared accent, geometric sans, crisp 3px radii, layered shadows.</div></body></html>
