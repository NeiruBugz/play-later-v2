<!DOCTYPE html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}html,body{margin:0}body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px}.row{display:flex;gap:12px;flex-wrap:wrap}.col{display:flex;flex-direction:column;gap:5px;align-items:center}.sw{width:74px;height:54px;border-radius:8px;border:1px solid var(--border)}.lbl{font-size:11px;letter-spacing:.04em;color:var(--muted-foreground)}.mono{font-family:var(--font-runtime-mono)}</style></head><body>
<div class="lbl mono" style="margin-bottom:10px">DARK — warm charcoal (dim reading room)</div>
<div class="row">
  <div class="col"><div class="sw" style="background:var(--background)"></div><div class="lbl">bg</div></div><div class="col"><div class="sw" style="background:var(--card)"></div><div class="lbl">card</div></div><div class="col"><div class="sw" style="background:var(--foreground)"></div><div class="lbl">fg</div></div><div class="col"><div class="sw" style="background:var(--primary)"></div><div class="lbl">primary</div></div><div class="col"><div class="sw" style="background:var(--secondary)"></div><div class="lbl">secondary</div></div><div class="col"><div class="sw" style="background:var(--muted)"></div><div class="lbl">muted</div></div><div class="col"><div class="sw" style="background:var(--accent)"></div><div class="lbl">accent</div></div><div class="col"><div class="sw" style="background:var(--border)"></div><div class="lbl">border</div></div>
</div></body></html>
