<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box}html,body{margin:0}body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.col{display:flex;flex-direction:column;gap:10px}.sw{border-radius:8px;border:1px solid var(--border)}.mono{font-family:var(--font-runtime-mono)}.mut{color:var(--muted-foreground)}.lbl{font-size:11px;letter-spacing:.04em}</style></head><body>
<div class="lbl mono mut" style="margin-bottom:10px">LIGHT — warm cream (cozy curation desk)</div>
<div class="row">
  <div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--background)"></div><div class="lbl mut">bg</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--card)"></div><div class="lbl mut">card</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--foreground)"></div><div class="lbl mut">ink</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--primary)"></div><div class="lbl mut">primary</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--secondary)"></div><div class="lbl mut">secondary</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--muted)"></div><div class="lbl mut">muted</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--accent)"></div><div class="lbl mut">accent</div></div><div class="col" style="gap:5px;align-items:center"><div class="sw" style="width:74px;height:54px;background:var(--border)"></div><div class="lbl mut">border</div></div>
</div></body></html>
