<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.sw{border-radius:8px;border:1px solid var(--border)}
.mono{font-family:var(--font-runtime-mono)}
.mut{color:var(--muted-foreground)}
.lbl{font-size:11px;letter-spacing:.04em}

</style></head><body>
<div class="col" style="gap:8px">
  <div class="body-lg" style="margin:0">Body large — Curate your collection across every platform.</div>
  <div class="body-md" style="margin:0">Body medium — Journal what made each game matter, in your own words.</div>
  <div class="body-sm mut" style="margin:0">Body small — playtime is enough, thoughts are optional.</div>
  <div class="row" style="gap:16px;margin-top:4px">
    <span class="caption mut">Caption · APR 22</span>
    <span class="overline mut">OVERLINE · CURRENTLY EXPLORING</span>
  </div>
</div>
<div class="lbl mut mono" style="margin-top:12px">Geist · body / caption / overline</div>
</body></html>
