<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--background);color:var(--foreground);font-family:var(--font-runtime-sans);padding:20px 24px;-webkit-font-smoothing:antialiased}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.sw{border-radius:8px;border:1px solid var(--border)}
.mono{font-family:var(--font-runtime-mono)}
.mut{color:var(--muted-foreground)}
.lbl{font-size:11px;letter-spacing:.04em}

</style></head><body>
<div class="lbl mono mut" style="margin-bottom:12px">PLATFORM · brand-constant across every theme</div>
<div class="row" style="gap:10px">
  <div class="col" style="align-items:center;gap:5px"><div class="sw" style="width:84px;height:40px;background:#0070d1"></div><div class="lbl mut">PlayStation</div></div>
  <div class="col" style="align-items:center;gap:5px"><div class="sw" style="width:84px;height:40px;background:#107c10"></div><div class="lbl mut">Xbox</div></div>
  <div class="col" style="align-items:center;gap:5px"><div class="sw" style="width:84px;height:40px;background:#e60012"></div><div class="lbl mut">Nintendo</div></div>
  <div class="col" style="align-items:center;gap:5px"><div class="sw" style="width:84px;height:40px;background:#1b2838"></div><div class="lbl mut">PC</div></div>
</div></body></html>
