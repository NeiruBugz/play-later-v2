<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SavePoint UI/UX Audit — Comprehensive Analysis</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js" crossorigin="anonymous"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: oklch(0.985 0.002 260);
      --fg: oklch(0.15 0.01 260);
      --card: oklch(1 0 0);
      --card-border: oklch(0.9 0.005 260);
      --muted: oklch(0.45 0.01 260);
      --primary: oklch(0.62 0.16 172);
      --primary-fg: oklch(0.99 0.002 175);
      --success: oklch(0.6 0.16 145);
      --warning: oklch(0.75 0.15 75);
      --error: oklch(0.55 0.2 25);
      --shadow: 0 2px 8px oklch(0 0 0 / 0.06);
      --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: oklch(0.155 0.007 260);
        --fg: oklch(0.93 0.005 250);
        --card: oklch(0.18 0.007 260);
        --card-border: oklch(0.24 0.008 250);
        --muted: oklch(0.6 0.005 250);
        --primary: oklch(0.69 0.17 172);
        --primary-fg: oklch(0.12 0.01 175);
        --shadow: 0 2px 12px oklch(0 0 0 / 0.45);
        --shadow-lg: 0 8px 40px oklch(0 0 0 / 0.6);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page-header {
      background: var(--card);
      border-bottom: 1px solid var(--card-border);
      padding: 2rem 1.5rem;
      margin-bottom: 2rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    .header-content {
      max-width: 900px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .meta-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 600;
    }

    .meta-value {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .section {
      margin-bottom: 3rem;
    }

    .section-header {
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .section-description {
      font-size: 1rem;
      color: var(--muted);
    }

    .toc {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }

    .toc h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }

    .toc-list {
      list-style: none;
      display: grid;
      gap: 0.5rem;
    }

    .toc-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .toc-item:hover {
      background: var(--bg);
    }

    .toc-link {
      color: var(--fg);
      text-decoration: none;
      flex: 1;
      font-size: 0.9375rem;
      font-weight: 500;
    }

    .severity-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0.625rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .severity-critical {
      background: oklch(0.55 0.2 25 / 0.15);
      color: var(--error);
    }

    .severity-high {
      background: oklch(0.75 0.15 75 / 0.15);
      color: var(--warning);
    }

    .severity-medium {
      background: oklch(0.62 0.16 172 / 0.15);
      color: var(--primary);
    }

    .severity-low {
      background: oklch(0.6 0.16 145 / 0.15);
      color: var(--success);
    }

    .severity-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .severity-critical .severity-dot {
      background: var(--error);
    }

    .severity-high .severity-dot {
      background: var(--warning);
    }

    .severity-medium .severity-dot {
      background: var(--primary);
    }

    .severity-low .severity-dot {
      background: var(--success);
    }

    .finding-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }

    .finding-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .finding-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .finding-description {
      color: var(--muted);
      font-size: 0.9375rem;
      margin-bottom: 1rem;
    }

    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    @media (max-width: 900px) {
      .comparison-grid {
        grid-template-columns: 1fr;
      }
    }

    .comparison-panel {
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
    }

    .comparison-header {
      padding: 0.75rem 1rem;
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .current {
      background: oklch(0.55 0.2 25 / 0.08);
      color: var(--error);
    }

    .improved {
      background: oklch(0.6 0.16 145 / 0.08);
      color: var(--success);
    }

    .comparison-content {
      padding: 1rem;
      background: var(--bg);
    }

    .mockup-container {
      background: var(--card);
      border-radius: 6px;
      padding: 1.5rem;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .impact-list {
      list-style: none;
      display: grid;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .impact-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--bg);
      border-radius: 6px;
      font-size: 0.9375rem;
    }

    .impact-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: white;
    }

    .impact-positive {
      background: var(--success);
    }

    .impact-negative {
      background: var(--error);
    }

    .recommendation-box {
      background: oklch(0.6 0.16 145 / 0.08);
      border-left: 3px solid var(--success);
      padding: 1rem;
      border-radius: 6px;
      margin-top: 1rem;
    }

    .recommendation-title {
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9375rem;
    }

    .recommendation-text {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .summary-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .summary-number {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .summary-label {
      font-size: 0.875rem;
      color: var(--muted);
      font-weight: 500;
    }

    code {
      background: var(--bg);
      padding: 0.125rem 0.375rem;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.875em;
      color: var(--primary);
    }

    .code-block {
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
      overflow-x: auto;
    }

    .code-block code {
      background: transparent;
      padding: 0;
    }

    pre {
      margin: 0;
      font-size: 0.875rem;
      line-height: 1.5;
    }
  </style>
</head>

                  </p>
                </div>
              </div>

              <div className="finding-card">
                <div className="finding-header">
                  <div style={{ flex: 1 }}>
                    <h3 className="finding-title">7. Card Metadata Hierarchy</h3>
                  </div>
                  <span className="severity-badge severity-medium">
                    <span className="severity-dot"></span>
                    Medium
                  </span>
                </div>
                <p className="finding-description">
                  Library cards show: title (2 lines) → status label → rating stars. No playtime, platform, or last-updated metadata. For patient gamers tracking progress, this omits key context.
                </p>

                <ul className="impact-list">
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Missing context:</strong> Can't see playtime without clicking into detail page</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Redundant status label:</strong> Takes space that could show useful metadata (see Finding #4)</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-positive">+</span>
                    <span><strong>Good rating display:</strong> Stars are clear and scannable</span>
                  </li>
                </ul>

                <div className="recommendation-box">
                  <div className="recommendation-title">✓ Recommendation</div>
                  <p className="recommendation-text">
                    <strong>Show contextual metadata:</strong> Replace status text label with playtime (for Playing/Played) or platform (for Wishlist/Shelf). Move status to cover badge. Use icons for compactness (clock icon + "32h played").
                  </p>
                </div>
              </div>

              <div className="finding-card">
                <div className="finding-header">
                  <div style={{ flex: 1 }}>
                    <h3 className="finding-title">8. Missing First-Time User Guidance</h3>
                  </div>
                  <span className="severity-badge severity-medium">
                    <span className="severity-dot"></span>
                    Medium
                  </span>
                </div>
                <p className="finding-description">
                  New users land on an empty dashboard with no guidance on how to add games. The only hint is a "Find a game to start" button when playing games list is empty, but this appears in a non-obvious location.
                </p>

                <ul className="impact-list">
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>High bounce risk:</strong> Empty states without clear CTAs lead to abandonment</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Unclear value prop:</strong> Users don't see what the app can do until library has content</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Friction to first value:</strong> No quick path to Steam import or search from empty state</span>
                  </li>
                </ul>

                <div className="recommendation-box">
                  <div className="recommendation-title">✓ Recommendation</div>
                  <p className="recommendation-text">
                    <strong>Onboarding flow for new users:</strong> Detect empty library and show a welcoming modal or hero section with 3 CTAs: "Import from Steam", "Search for Games", "Browse Popular". Include a preview screenshot of a populated library to communicate value.
                  </p>
                </div>
              </div>

              <div className="finding-card">
                <div className="finding-header">
                  <div style={{ flex: 1 }}>
                    <h3 className="finding-title">9. Insufficient Loading State Feedback</h3>
                  </div>
                  <span className="severity-badge severity-medium">
                    <span className="severity-dot"></span>
                    Medium
                  </span>
                </div>
                <p className="finding-description">
                  The app uses <code>{'<Suspense fallback={<LoadingScreen />}>'}</code> globally, but individual interactions (filter changes, search) show no loading state. Users on slow connections see stale content for 1-3 seconds.
                </p>

                <ul className="impact-list">
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Perceived slowness:</strong> No feedback makes the app feel unresponsive even when it's working</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Double-clicks:</strong> Users re-click filters thinking they didn't register</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-positive">+</span>
                    <span><strong>Good skeleton for grids:</strong> <code>{'<LibraryGridSkeleton />'}</code> exists and looks polished</span>
                  </li>
                </ul>

                <div className="recommendation-box">
                  <div className="recommendation-title">✓ Recommendation</div>
                  <p className="recommendation-text">
                    <strong>Optimistic UI + subtle spinners:</strong> Show filter button in "loading" state (spinner icon, disabled) during fetch. Fade out current grid and show skeleton during filter/search changes. Use <code>{'useTransition()'}</code> for smoother transitions.
                  </p>
                </div>
              </div>

              <div className="finding-card">
                <div className="finding-header">
                  <div style={{ flex: 1 }}>
                    <h3 className="finding-title">10. Inconsistent Visual Rhythm</h3>
                  </div>
                  <span className="severity-badge severity-low">
                    <span className="severity-dot"></span>
                    Low
                  </span>
                </div>
                <p className="finding-description">
                  The design system uses both semantic spacing tokens (<code>--space-xs</code> through <code>--space-5xl</code>) and Tailwind utility classes (<code>gap-md</code>, <code>p-xl</code>), but application is inconsistent. Some cards use <code>p-xl</code> (16px), others <code>p-2xl</code> (24px).
                </p>

                <ul className="impact-list">
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Visual noise:</strong> Inconsistent padding/margins create subtle misalignment across pages</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Developer confusion:</strong> Two parallel systems make it unclear which to use</span>
                  </li>
                </ul>

                <div className="recommendation-box">
                  <div className="recommendation-title">✓ Recommendation</div>
                  <p className="recommendation-text">
                    <strong>Enforce spacing scale via linting:</strong> Pick one system (Tailwind is already the default), deprecate CSS custom properties for spacing. Add ESLint rule to flag hard-coded pixel values. Audit existing components and normalize to <code>p-xl</code> for cards, <code>gap-md</code> for inline elements.
                  </p>
                </div>
              </div>

              <div className="finding-card">
                <div className="finding-header">
                  <div style={{ flex: 1 }}>
                    <h3 className="finding-title">11. Hidden Action Affordances</h3>
                  </div>
                  <span className="severity-badge severity-low">
                    <span className="severity-dot"></span>
                    Low
                  </span>
                </div>
                <p className="finding-description">
                  Library cards use a hover-only action bar on desktop (<code>{'<LibraryCardActionBar />'}</code>) that appears over the cover. Mobile uses swipe gestures. Both patterns hide functionality until the user "discovers" them.
                </p>

                <ul className="impact-list">
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Low discoverability:</strong> First-time users may never find quick actions</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-positive">+</span>
                    <span><strong>Clean card design:</strong> Hiding actions keeps focus on game covers</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-positive">+</span>
                    <span><strong>Good fallback:</strong> Users can always click into detail page for full controls</span>
                  </li>
                </ul>

                <div className="recommendation-box">
                  <div className="recommendation-title">✓ Recommendation</div>
                  <p className="recommendation-text">
                    <strong>Show one primary action:</strong> For Playing/Up Next cards, show a persistent "Log Session" button below the cover. Keep secondary actions in hover/swipe. This balances discoverability with visual cleanliness.
                  </p>
                </div>
              </div>

              <div className="finding-card">
                <div className="finding-header">
                  <div style={{ flex: 1 }}>
                    <h3 className="finding-title">12. Theme-Specific Visual Noise</h3>
                  </div>
                  <span className="severity-badge severity-low">
                    <span className="severity-dot"></span>
                    Low
                  </span>
                </div>
                <p className="finding-description">
                  The app ships with three themes: default dark, Y2K (Xbox green neon), and Jewel (PS2 boot-screen aesthetic). Y2K and Jewel add significant visual effects (glows, chrome text, corner brackets, breathing animations) that may distract from content.
                </p>

                <ul className="impact-list">
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Accessibility concerns:</strong> Animations and high-contrast glows can trigger motion sensitivity</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-negative">−</span>
                    <span><strong>Branding confusion:</strong> Jewel/Y2K themes feel like Easter eggs, not core brand</span>
                  </li>
                  <li className="impact-item">
                    <span className="impact-icon impact-positive">+</span>
                    <span><strong>Good opt-in:</strong> Themes are user-selected, not forced</span>
                  </li>
                </ul>

                <div className="recommendation-box">
                  <div className="recommendation-title">✓ Recommendation</div>
                  <p className="recommendation-text">
                    <strong>Respect prefers-reduced-motion:</strong> Disable breathing animations and glows when <code>@media (prefers-reduced-motion: reduce)</code> is active, even in Y2K/Jewel themes. Consider moving experimental themes to a "Labs" section of settings to set expectations.
                  </p>
                </div>
              </div>
            </div>

            <div className="section">
              <div className="section-header">
                <h2>Summary & Next Steps</h2>
              </div>
              <div className="finding-card">
                <h3 className="finding-title">Prioritized Action Plan</h3>
                <div className="finding-description" style={{ marginBottom: '1.5rem' }}>
                  Based on user impact and implementation effort, here's a recommended roadmap:
                </div>

                <div style={{ display: 'grid', gap: '1rem' }}>
                  <div style={{ padding: '1rem', background: 'oklch(0.55 0.2 25 / 0.08)', border: '2px solid oklch(0.55 0.2 25 / 0.2)', borderRadius: '8px' }}>
                    <div style={{ fontWeight: 600, marginBottom: '0.5rem', color: 'var(--error)' }}>🔥 Week 1-2: Quick Wins (High Impact, Low Effort)</div>
                    <ul style={{ paddingLeft: '1.25rem', fontSize: '0.9375rem', lineHeight: 1.6 }}>
                      <li>Add counts to all status filter chips</li>
                      <li>Increase search input prominence (height, border, position)</li>
                      <li>Show playtime metadata on library cards (replace redundant status text)</li>
                      <li>Add <code>prefers-reduced-motion</code> support to Y2K/Jewel themes</li>
                    </ul>
                  </div>

                  <div style={{ padding: '1rem', background: 'oklch(0.75 0.15 75 / 0.08)', border: '2px solid oklch(0.75 0.15 75 / 0.2)', borderRadius: '8px' }}>
                    <div style={{ fontWeight: 600, marginBottom: '0.5rem', color: 'var(--warning)' }}>⚡ Week 3-4: Medium Effort, High Value</div>
                    <ul style={{ paddingLeft: '1.25rem', fontSize: '0.9375rem', lineHeight: 1.6 }}>
                      <li>Redesign library filters with vertical layout + progressive disclosure</li>
                      <li>Replace horizontal scroll with grid/wrap on mobile status filters</li>
                      <li>Simplify dashboard hero to single primary action per game</li>
                      <li>Add loading states to filter/search interactions</li>
                    </ul>
                  </div>

                  <div style={{ padding: '1rem', background: 'oklch(0.62 0.16 172 / 0.08)', border: '2px solid oklch(0.62 0.16 172 / 0.2)', borderRadius: '8px' }}>
                    <div style={{ fontWeight: 600, marginBottom: '0.5rem', color: 'var(--primary)' }}>🎯 Month 2: Bigger Investments</div>
                    <ul style={{ paddingLeft: '1.25rem', fontSize: '0.9375rem', lineHeight: 1.6 }}>
                      <li>Build onboarding flow for new users (empty state → import/search)</li>
                      <li>Improve card status visibility with badge overlays</li>
                      <li>Audit and normalize spacing scale across components</li>
                    </ul>
                  </div>
                </div>

                <div style={{ marginTop: '1.5rem', padding: '1rem', background: 'var(--bg)', borderRadius: '8px' }}>
                  <div style={{ fontWeight: 600, marginBottom: '0.5rem' }}>📊 Success Metrics</div>
                  <ul style={{ paddingLeft: '1.25rem', fontSize: '0.875rem', color: 'var(--muted)', lineHeight: 1.6 }}>
                    <li>Time to first game added (target: &lt;60 seconds)</li>
                    <li>Filter interaction rate (% of sessions using filters)</li>
                    <li>Mobile filter discovery (% finding hidden chips)</li>
                    <li>Dashboard quick-log conversion (% completing log from hero)</li>
                  </ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AuditApp />);
  </script>
</body>
</html>
