<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SavePoint UI/UX Audit V2 — Round 2</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: oklch(0.985 0.002 260);
      --fg: oklch(0.15 0.01 260);
      --card: oklch(1 0 0);
      --card-border: oklch(0.9 0.005 260);
      --muted: oklch(0.45 0.01 260);
      --primary: oklch(0.62 0.16 172);
      --primary-fg: oklch(0.99 0.002 175);
      --success: oklch(0.6 0.16 145);
      --warning: oklch(0.75 0.15 75);
      --error: oklch(0.55 0.2 25);
      --shadow: 0 2px 8px oklch(0 0 0 / 0.06);
      --shadow-lg: 0 8px 24px oklch(0 0 0 / 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: oklch(0.155 0.007 260);
        --fg: oklch(0.93 0.005 250);
        --card: oklch(0.18 0.007 260);
        --card-border: oklch(0.24 0.008 250);
        --muted: oklch(0.6 0.005 250);
        --primary: oklch(0.69 0.17 172);
        --primary-fg: oklch(0.12 0.01 175);
        --shadow: 0 2px 12px oklch(0 0 0 / 0.45);
        --shadow-lg: 0 8px 40px oklch(0 0 0 / 0.6);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .page-header {
      background: var(--card);
      border-bottom: 1px solid var(--card-border);
      padding: 2.5rem 1.5rem 2rem;
      margin-bottom: 2rem;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem 4rem; }
    .header-content { max-width: 980px; margin: 0 auto; }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 1rem;
    }
    .eyebrow::before {
      content: ''; width: 24px; height: 1px; background: var(--muted);
    }

    h1 { font-size: 2.75rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: -0.025em; line-height: 1.1; }
    .subtitle { font-size: 1.125rem; color: var(--muted); margin-bottom: 1.75rem; max-width: 720px; }

    .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.25rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--card-border); }
    .meta-item { display: flex; flex-direction: column; gap: 0.25rem; }
    .meta-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
    .meta-value { font-size: 0.9rem; font-weight: 500; }

    .section { margin-bottom: 3.5rem; }
    .section-header { margin-bottom: 1.5rem; }
    h2 { font-size: 1.875rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.015em; }
    .section-description { font-size: 1rem; color: var(--muted); max-width: 760px; }

    .toc {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow);
    }
    .toc h3 { font-size: 0.75rem; font-weight: 700; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    .toc-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 0.25rem; }
    .toc-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.75rem; border-radius: 6px; transition: background 0.15s; }
    .toc-item:hover { background: var(--bg); }
    .toc-link { color: var(--fg); text-decoration: none; flex: 1; font-size: 0.9rem; font-weight: 500; }
    .toc-num { font-size: 0.75rem; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 1.5rem; }

    .severity-badge {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.25rem 0.625rem; border-radius: 99px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .severity-critical { background: oklch(0.55 0.2 25 / 0.15); color: var(--error); }
    .severity-high { background: oklch(0.75 0.15 75 / 0.18); color: var(--warning); }
    .severity-medium { background: oklch(0.62 0.16 172 / 0.15); color: var(--primary); }
    .severity-low { background: oklch(0.6 0.16 145 / 0.15); color: var(--success); }
    .severity-dot { width: 6px; height: 6px; border-radius: 50%; }
    .severity-critical .severity-dot { background: var(--error); }
    .severity-high .severity-dot { background: var(--warning); }
    .severity-medium .severity-dot { background: var(--primary); }
    .severity-low .severity-dot { background: var(--success); }

    .area-tag {
      display: inline-flex; align-items: center;
      padding: 0.2rem 0.55rem; border-radius: 4px;
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.02em;
      background: var(--bg); color: var(--muted);
      border: 1px solid var(--card-border);
    }

    .finding-card {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 1.75rem; margin-bottom: 1.25rem;
      box-shadow: var(--shadow);
    }

    .finding-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
    .finding-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .finding-title { font-size: 1.25rem; font-weight: 600; line-height: 1.3; }
    .finding-description { color: var(--muted); font-size: 0.95rem; margin-bottom: 1rem; max-width: 780px; }

    .finding-section-title {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin: 1.5rem 0 0.625rem;
    }

    .impact-list { list-style: none; display: grid; gap: 0.5rem; }
    .impact-item {
      display: flex; align-items: flex-start; gap: 0.625rem;
      padding: 0.625rem 0.75rem; background: var(--bg); border-radius: 6px;
      font-size: 0.9rem; line-height: 1.5;
    }
    .impact-icon {
      flex-shrink: 0; width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: white;
      margin-top: 1px;
    }
    .impact-positive { background: var(--success); }
    .impact-negative { background: var(--error); }
    .impact-neutral { background: var(--muted); }

    .recommendation-box {
      background: oklch(0.6 0.16 145 / 0.08);
      border-left: 3px solid var(--success);
      padding: 1rem 1.25rem; border-radius: 6px; margin-top: 1.25rem;
    }
    .recommendation-title { font-weight: 600; margin-bottom: 0.375rem; font-size: 0.9375rem; }
    .recommendation-text { font-size: 0.875rem; color: var(--muted); line-height: 1.55; }

    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .summary-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; padding: 1.25rem 1.5rem; box-shadow: var(--shadow); }
    .summary-number { font-size: 2.25rem; font-weight: 700; margin-bottom: 0.25rem; letter-spacing: -0.02em; }
    .summary-label { font-size: 0.8125rem; color: var(--muted); font-weight: 500; }

    .severity-row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
    .severity-row > span { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--muted); }

    code {
      background: var(--bg); padding: 0.1rem 0.4rem; border-radius: 4px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 0.85em; color: var(--primary);
      border: 1px solid var(--card-border);
    }

    .scope-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.625rem; margin-top: 1rem;
    }
    .scope-pill {
      display: flex; align-items: center; gap: 0.625rem;
      padding: 0.625rem 0.875rem;
      background: var(--bg); border: 1px solid var(--card-border);
      border-radius: 8px; font-size: 0.875rem;
    }
    .scope-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); flex-shrink: 0; }

    .canvas-wrap { margin: 0 -1.5rem; padding: 0 0.5rem; }

    .pinned-box {
      background: oklch(0.75 0.15 75 / 0.1);
      border-left: 3px solid oklch(0.75 0.15 75);
      padding: 0.875rem 1.125rem;
      border-radius: 6px;
      margin-top: 0.875rem;
    }
    .pinned-title { font-weight: 600; margin-bottom: 0.25rem; font-size: 0.9375rem; display: flex; align-items: center; gap: 0.375rem; color: oklch(0.6 0.15 75); }
    @media (prefers-color-scheme: dark) {
      .pinned-title { color: oklch(0.85 0.15 80); }
    }
    .pinned-text { font-size: 0.875rem; color: var(--muted); line-height: 1.55; }

    .picked-badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.1rem 0.45rem; border-radius: 99px;
      background: oklch(0.75 0.15 75 / 0.2);
      color: oklch(0.5 0.15 75);
      font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.02em;
    }
    @media (prefers-color-scheme: dark) {
      .picked-badge { color: oklch(0.85 0.15 80); }
    }

    .pinned-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .pinned-summary-card {
      display: block;
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 1.25rem; box-shadow: var(--shadow);
      text-decoration: none; color: var(--fg);
      transition: transform 0.15s, box-shadow 0.15s;
      border-left: 3px solid oklch(0.75 0.15 75);
    }
    .pinned-summary-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .pinned-summary-extra { border-left-color: var(--primary); }
    .pinned-summary-num {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      color: oklch(0.6 0.15 75); margin-bottom: 0.5rem;
    }
    @media (prefers-color-scheme: dark) {
      .pinned-summary-num { color: oklch(0.85 0.15 80); }
    }
    .pinned-summary-extra .pinned-summary-num { color: var(--primary); }
    .pinned-summary-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; line-height: 1.3; }
    .pinned-summary-decision { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }

    .fixes-box {
      background: oklch(0.62 0.16 172 / 0.06);
      border: 1px solid oklch(0.62 0.16 172 / 0.25);
      border-radius: 8px;
      padding: 1.125rem 1.25rem;
      margin-top: 0.875rem;
    }
    @media (prefers-color-scheme: dark) {
      .fixes-box { background: oklch(0.69 0.17 172 / 0.08); border-color: oklch(0.69 0.17 172 / 0.3); }
    }
    .fixes-header {
      display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .fixes-title {
      font-weight: 600; font-size: 0.9375rem;
      color: var(--primary);
      display: flex; align-items: center; gap: 0.375rem;
    }
    .fixes-file {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      background: var(--bg);
    }
    .fixes-intro {
      font-size: 0.875rem; color: var(--muted); line-height: 1.55;
      margin-bottom: 0.875rem;
    }
    .fixes-list {
      list-style: none;
      counter-reset: fix;
      display: grid; gap: 0.5rem;
      padding: 0;
    }
    .fixes-item {
      counter-increment: fix;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.625rem;
      align-items: start;
      padding: 0.625rem 0.75rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .fixes-item::before {
      content: counter(fix);
      grid-column: 1;
      grid-row: 1;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 1.25rem;
      padding-top: 1px;
    }
    .fixes-tag {
      grid-column: 2;
      grid-row: 1;
      align-self: start;
      justify-self: start;
      display: inline-flex;
      padding: 0.1rem 0.45rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    .fixes-tag-layout { background: oklch(0.62 0.16 172 / 0.15); color: var(--primary); }
    .fixes-tag-content { background: oklch(0.75 0.15 75 / 0.18); color: oklch(0.55 0.15 75); }
    .fixes-tag-type { background: oklch(0.6 0.16 280 / 0.15); color: oklch(0.55 0.16 280); }
    .fixes-tag-structure { background: oklch(0.6 0.16 145 / 0.15); color: var(--success); }
    .fixes-tag-mobile { background: oklch(0.55 0.2 25 / 0.12); color: var(--error); }
    @media (prefers-color-scheme: dark) {
      .fixes-tag-content { color: oklch(0.85 0.15 80); }
      .fixes-tag-type { color: oklch(0.78 0.16 280); }
    }
    .fixes-text {
      grid-column: 2;
      grid-row: 2;
      color: var(--fg);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="audit-v2/mockups-detail.jsx"></script>
  <script type="text/babel" src="audit-v2/mockups-journal.jsx"></script>
  <script type="text/babel" src="audit-v2/mockups-profile.jsx"></script>
  <script type="text/babel" src="audit-v2/mockups-nav.jsx"></script>
  <script type="text/babel" src="audit-v2/mockups-misc.jsx"></script>
  <script type="text/babel" src="audit-v2/audit-app.jsx"></script>
</body>
</html>
