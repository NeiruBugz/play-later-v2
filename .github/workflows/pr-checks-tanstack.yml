name: PR Code Quality Checks (TanStack)

on:
  pull_request:
    branches: [main]
    paths:
      - "savepoint-tanstack/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/pr-checks-tanstack.yml"

concurrency:
  group: pr-checks-tanstack-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (typecheck, lint, format, coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Coverage runs the merged unit + integration projects, and the
      # integration project needs a real Postgres on :6432 (the isolated-db
      # helper does `docker exec savepoint-postgres` + `prisma migrate deploy`).
      # Same docker-compose service the integration.yml workflow provisions.
      - name: Set up Postgres (Docker Compose)
        run: docker compose -f docker-compose.yml up -d postgres-db

      - name: Wait for Postgres readiness
        run: |
          echo "Waiting for Postgres (savepoint-postgres) to be ready..."
          for i in {1..60}; do
            if docker exec savepoint-postgres pg_isready -U postgres >/dev/null 2>&1; then
              echo "Postgres is ready."; break; fi; sleep 2; done
          docker exec savepoint-postgres pg_isready -U postgres

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        env:
          # prisma.config.ts requires a database URL at config-load time even
          # for `prisma generate` (which never connects). Use a placeholder so
          # the step doesn't depend on tanstack-only PRs having DB secrets.
          POSTGRES_PRISMA_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          POSTGRES_URL_NON_POOLING: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm --filter savepoint-tanstack prisma:generate

      - name: Typecheck
        run: pnpm --filter savepoint-tanstack typecheck

      - name: Lint (incl. FSD boundary rule)
        run: pnpm --filter savepoint-tanstack lint

      - name: Format check
        run: pnpm --filter savepoint-tanstack format:check

      # Compiles the production bundle (vite build + nitro/vite → .output/).
      # Catches client/server bundler-graph breaks the type/lint/test steps miss
      # — e.g. a public barrel re-exporting a server-only `.server.ts` value into
      # the client bundle, which trips tanstack-start's import-protection plugin.
      - name: Build (production bundle)
        env:
          # `build` now runs `prisma generate && vite build` so a fresh checkout
          # (e.g. Vercel) generates the client into the source tree before
          # bundling. `prisma.config.ts` requires a DB URL at config-load even
          # for generate (which never connects) — placeholder, mirroring the
          # dedicated generate step above.
          POSTGRES_PRISMA_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          POSTGRES_URL_NON_POOLING: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm --filter savepoint-tanstack build

      # Runs the merged unit + integration projects under v8 coverage and
      # enforces the Slice 23 thresholds from vitest.config.ts (statements ≥85
      # is the cutover gate; branches/lines/functions are regression floors).
      # Replaces the prior unit-only step — test:coverage runs both projects.
      - name: Tests + coverage gate (unit + integration)
        run: pnpm --filter savepoint-tanstack test:coverage

      - name: Teardown Docker services
        if: always()
        run: docker compose -f docker-compose.yml down -v

  audit:
    name: Supply Chain Audit (pnpm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the PR on any HIGH or CRITICAL advisory in the production
      # dependency tree. This is the same guard as pr-checks.yml; running it
      # under both workflows means tanstack-only PRs (which skip pr-checks.yml
      # via path-filters) still pass through supply-chain review.
      - name: Run pnpm audit (production deps, high+critical)
        run: pnpm audit --prod --audit-level=high

  freshness:
    name: Dependency Freshness (7-day quarantine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need merge-base with target branch so the script can diff package.json files
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Blocks PRs that add or upgrade a dep to a version published <7 days ago.
      # Implements SCS-04 (2026-05-18 audit) without introducing a Renovate dependency.
      - name: Check dependency publish-age vs 7-day quarantine
        run: node scripts/check-package-freshness.mjs --base origin/${{ github.base_ref }} --head HEAD --days 7

  migration-validation:
    name: Validate Database Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for migration changes
        id: check-migrations
        run: |
          MIGRATION_CHANGES=$(git diff --name-only origin/main...HEAD -- savepoint-tanstack/prisma/ | grep -E "(schema\.prisma|migrations/.*\.sql)$" || true)
          if [ -z "$MIGRATION_CHANGES" ]; then
            echo "No migration or schema changes detected"
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "Migration or schema changes detected:"
            echo "$MIGRATION_CHANGES"
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.check-migrations.outputs.has-changes == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.check-migrations.outputs.has-changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        if: steps.check-migrations.outputs.has-changes == 'true'
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        if: steps.check-migrations.outputs.has-changes == 'true'
        env:
          # prisma.config.ts requires a DB URL at config-load even for validate
          # (which never connects) — placeholder, same as the generate step.
          POSTGRES_PRISMA_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          POSTGRES_URL_NON_POOLING: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: pnpm --filter savepoint-tanstack exec prisma validate

      - name: Check for schema drift (schema changed without a migration)
        if: steps.check-migrations.outputs.has-changes == 'true'
        run: |
          NEW_MIGRATIONS=$(git diff --name-only origin/main...HEAD -- savepoint-tanstack/prisma/migrations/ | grep -E "\.sql$" || true)
          SCHEMA_CHANGES=$(git diff --name-only origin/main...HEAD -- savepoint-tanstack/prisma/schema.prisma || true)
          if [ -n "$SCHEMA_CHANGES" ] && [ -z "$NEW_MIGRATIONS" ]; then
            echo "⚠️ Schema changes detected but no new migration files found."
            echo "Run 'pnpm --filter savepoint-tanstack prisma:migrate --name descriptive_name' to generate one."
            exit 1
          elif [ -n "$SCHEMA_CHANGES" ] && [ -n "$NEW_MIGRATIONS" ]; then
            echo "✅ Schema changes detected with corresponding migration files."
          elif [ -n "$NEW_MIGRATIONS" ] && [ -z "$SCHEMA_CHANGES" ]; then
            echo "ℹ️ Migration files added without schema changes (manual migrations)."
          else
            echo "✅ No schema drift detected."
          fi

      - name: Check for destructive migrations
        if: steps.check-migrations.outputs.has-changes == 'true'
        run: |
          NEW_MIGRATIONS=$(git diff --name-only origin/main...HEAD -- savepoint-tanstack/prisma/migrations/ | grep -E "\.sql$" || true)
          if [ -n "$NEW_MIGRATIONS" ]; then
            echo "Checking new migrations for destructive operations..."
            DESTRUCTIVE_FOUND=false
            for migration in $NEW_MIGRATIONS; do
              if [ -f "$migration" ]; then
                echo "Checking $migration:"
                if grep -i "DROP[[:space:]]\+\(TABLE\|COLUMN\|INDEX\|CONSTRAINT\)" "$migration"; then
                  echo "⚠️ Found potentially destructive DROP operation in $migration"
                  DESTRUCTIVE_FOUND=true
                fi
                if grep -i "ALTER[[:space:]]\+COLUMN.*TYPE" "$migration"; then
                  echo "⚠️ Found column type change in $migration - review for potential data loss"
                  DESTRUCTIVE_FOUND=true
                fi
              fi
            done
            if [ "$DESTRUCTIVE_FOUND" = true ]; then
              echo ""
              echo "🚨 Destructive operations detected — review for data backup, reversibility, and stakeholder awareness. If intentional, note it in the PR."
            else
              echo "✅ No destructive operations found in new migrations."
            fi
          fi
